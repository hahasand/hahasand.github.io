<script>

function goodCards(cards) {
    if (cards.length<1) { return false; }
    if (cards.length<1) { return false; }    

    return true;
}

function deal() {
    let bday = datepicker.valueAsDate; //Date.UTC(2009, 4, 13);
    let epoch = Date.UTC(1800, 1, 1);
    let pocky = (bday - epoch) / 8.64e7;
    console.log('pocky number: ' + pocky);
    result.innerHTML = '';
    for (set of SETS) {
        if (!goodCards(set.cards)) { continue; }
        if (
            set.type=='promo' ||
            set.type=='memorabilia' ||
            set.type=='vanguard' ||
            set.type=='minigame' ||
            set.type=='token' ||
            set.type=='archenemy' ||
            set.type=='box' ||
            set.name.includes("Heroes of the Realm") == true
        ) {
            continue;
        }
        let fatedCard = set.cards[pocky % set.cards.length];
        console.log(set.cards.length + '    ' + set.name + ' ∋ ' + fatedCard.name);
        li = document.createElement('li');
        li.innerText = set.name + ': ' + fatedCard.name;
        result.append(li);
    }
    console.log(pocky);
}

</script>
